<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f17" />
    <meta name="description" content="The no-excuses 7-minute workout timer. Pick a routine, hit start, follow along with audio cues. No login, no ads, no subscription." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta property="og:title" content="FitFlow 7 — The no-excuses workout timer" />
    <meta property="og:description" content="Seven minutes. Twenty-four exercises. Zero subscriptions. Just open and go." />
    <meta property="og:type" content="website" />
    <title>FitFlow 7</title>
    <script>
      // Set the color theme before first paint to avoid a flash. Mirrors
      // storage.ts (KEY.theme = 'fitflow.theme', stored as a JSON string).
      (function () {
        try {
          var raw = localStorage.getItem('fitflow.theme');
          var pref = raw ? JSON.parse(raw) : 'dark';
          var resolved = pref === 'system'
            ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
            : pref;
          document.documentElement.dataset.theme = resolved === 'light' ? 'light' : 'dark';
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
